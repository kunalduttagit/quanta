services:

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ticket_backend
    env_file:
      - ./backend/.env
    restart: unless-stopped
    ports:
      - "127.0.0.1:8005:8000"
    networks:
      - app_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Next.js Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.quanta.kunaldutta.com/api/v1
    container_name: ticket_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3005:3000"
    networks:
      - app_net
    depends_on:
      - backend


networks:
  app_net:
    driver: bridge
